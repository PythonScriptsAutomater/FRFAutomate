name: JotForm → Google Sheets Sync

on:

  workflow_dispatch:
    inputs:
      total_limit:
        description: 'Max submissions to pull (TDR sync)'
        required: false
        default: '8000'

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — TDR submission sync
  # ─────────────────────────────────────────────
  sync-tdr:
    name: 'Step 1 · Sync TDR Updated sheet'
    runs-on: ubuntu-latest

    env:
      API_KEY:             ${{ secrets.API_KEY }}
      FORM_ID:             ${{ secrets.FORM_ID }}
      SPREADSHEET_NAME:    ${{ secrets.SPREADSHEET_NAME }}
      WORKSHEET_NAME_TDR:  ${{ secrets.WORKSHEET_NAME_TDR }}
      TOTAL_LIMIT:         ${{ github.event.inputs.total_limit || '8000' }}
      PAGE_SIZE:           '200'
      SLEEP_BETWEEN_CALLS: '2'
      WRITE_BATCH_SIZE:    '500'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Run TDR sync
        run: python FRFAutomate.py

      - name: Clean up credentials
        if: always()
        run: rm -f credentials.json

  # ─────────────────────────────────────────────
  # JOB 2 — Approval status sync (runs AFTER job 1)
  # ─────────────────────────────────────────────
  sync-approval:
    name: 'Step 2 · Sync Approval Status sheet'
    runs-on: ubuntu-latest
    needs: sync-tdr

    env:
      API_KEY:                  ${{ secrets.API_KEY }}
      FORM_ID:                  ${{ secrets.FORM_ID }}
      SPREADSHEET_NAME:         ${{ secrets.SPREADSHEET_NAME }}
      WORKSHEET_NAME_APPROVAL:  ${{ secrets.WORKSHEET_NAME_APPROVAL }}
      START_DATE:               '2023-08-01 00:00:00'
      PAGE_SIZE:                '300'
      SLEEP_BETWEEN_CALLS:      '1'
      MAX_PAGES:                '500'
      WRITE_BATCH_SIZE:         '500'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Run Approval sync
        run: python approval_status_sync.py

      - name: Clean up credentials
        if: always()
        run: rm -f credentials.json